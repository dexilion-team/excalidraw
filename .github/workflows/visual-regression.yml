name: Visual Regression Tests

on:
  pull_request:
    branches: [master]

jobs:
  visual-regression:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel preview deployment
        id: vercel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
          MAX_ATTEMPTS=20
          SLEEP_SECONDS=30

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i/$MAX_ATTEMPTS: checking for Vercel preview deployment..."

            # Query GitHub Deployments API for a Preview deployment matching this commit
            DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments?sha=${COMMIT_SHA}&environment=Preview" \
              --jq '.[0].id // empty' 2>/dev/null)

            if [ -n "$DEPLOY_ID" ]; then
              # Check if the deployment is successful and get the URL
              URL=$(gh api "repos/${{ github.repository }}/deployments/${DEPLOY_ID}/statuses" \
                --jq '[.[] | select(.state == "success")][0].environment_url // empty' 2>/dev/null)

              if [ -n "$URL" ]; then
                echo "url=${URL}" >> $GITHUB_OUTPUT
                echo "skip=false" >> $GITHUB_OUTPUT
                echo "✅ Found Vercel preview: ${URL}"
                exit 0
              fi
            fi

            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "No ready preview deployment yet, waiting ${SLEEP_SECONDS}s..."
              sleep $SLEEP_SECONDS
            fi
          done

          echo "skip=true" >> $GITHUB_OUTPUT
          echo "⚠️ No Vercel preview deployment found after ${MAX_ATTEMPTS} attempts, skipping visual regression"

      - name: Run visual regression tests
        if: steps.vercel.outputs.skip != 'true'
        run: |
          npx @lastest/runner@latest trigger \
            --repo "${{ github.repository }}" \
            --server "${{ secrets.LASTEST_SERVER_URL }}" \
            --token "${{ secrets.LASTEST_RUNNER_TOKEN }}" \
            --target-url "${{ steps.vercel.outputs.url }}"
